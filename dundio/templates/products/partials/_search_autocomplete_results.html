{% for product in products %}
    <li class="dropdown-item clearfix">
        <a href="{% url 'product_details' product.slug %}">
            <div class="product-info">
                <figure>
                    <img src="{{ product.main_image.url }}" alt="{{ product.title }}">
                </figure>
                <p>{{ product.title }}</p>
            </div>
            <div class="product-price">
                {% if product.promotional_price %}
                    <span class="price old-price">{{ product.price }} лв.</span>
                    <span class="price new-price">{{ product.promotional_price }} лв.</span>
                {% else %}
                    <span class="price">{{ product.price }} лв.</span>
                {% endif %}
            </div>
        </a>
    </li>
{% empty %}
    <li class="dropdown-item">
        <p>Няма резултати</p>
    </li>
{% endfor %}
